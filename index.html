<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker Pro - User</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #0f172a; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; color: #fff; overflow: hidden; }
        .card { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(15px); padding: 30px; border-radius: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); text-align: center; width: 85%; max-width: 380px; border: 1px solid rgba(255,255,255,0.1); }
        h2 { margin: 0 0 5px 0; color: #38bdf8; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .info-box { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 12px; font-size: 13px; color: #94a3b8; }
        .info-box span { display: block; font-size: 18px; font-weight: bold; color: #fff; margin-top: 5px; }
        .btn { padding: 15px 30px; border: none; border-radius: 30px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; width: 100%; margin-top: 10px; }
        .btn-start { background-color: #3b82f6; color: white; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); }
        .btn-stop { background-color: #64748b; color: white; display: none; }
        .btn-sos { background-color: #ef4444; color: white; display: none; box-shadow: 0 4px 20px rgba(239, 68, 68, 0.6); animation: pulse-red 2s infinite; margin-top: 20px; border: 2px solid #b91c1c; }
        @keyframes pulse-red { 0% { transform: scale(1); } 50% { transform: scale(1.05); box-shadow: 0 0 25px rgba(239, 68, 68, 0.8); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="card">
        <h2>Live Tracker Pro</h2>
        <p style="color: #64748b; font-size: 14px;">Secure Connection</p>
        
        <div class="info-grid">
            <div class="info-box">Battery <span id="batTxt">--%</span></div>
            <div class="info-box">Speed <span id="speedTxt">0 km/h</span></div>
        </div>
        
        <button id="startBtn" class="btn btn-start">Turn ON Location</button>
        <button id="stopBtn" class="btn btn-stop">Turn OFF</button>
        <button id="sosBtn" class="btn btn-sos">🆘 EMERGENCY SOS</button>
        
        <div id="status" style="margin-top: 15px; font-size: 14px; color: #38bdf8;">Status: Waiting...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAoQw5dhwS5JJZIWSPQTgKdMtB5ZEsoxLk",
            authDomain: "arng-805db.firebaseapp.com",
            projectId: "arng-805db",
            databaseURL: "https://arng-805db-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const userRef = ref(db, 'live_location/target_user');

        let watchId = null;
        let isSOS = false;
        
        // DOM Elements
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const sosBtn = document.getElementById('sosBtn');
        const statusTxt = document.getElementById('status');
        const batTxt = document.getElementById('batTxt');
        const speedTxt = document.getElementById('speedTxt');

        // Get Battery Info
        let batteryLevel = "Unknown";
        let isCharging = false;
        if (navigator.getBattery) {
            navigator.getBattery().then(battery => {
                updateBattery(battery);
                battery.addEventListener('levelchange', () => updateBattery(battery));
                battery.addEventListener('chargingchange', () => updateBattery(battery));
            });
        }
        function updateBattery(b) {
            batteryLevel = Math.round(b.level * 100);
            isCharging = b.charging;
            batTxt.innerText = `${batteryLevel}% ${isCharging ? '⚡' : ''}`;
        }

        // Handle SOS
        sosBtn.addEventListener('click', () => {
            isSOS = !isSOS;
            sosBtn.innerText = isSOS ? "CANCEL SOS 🛑" : "🆘 EMERGENCY SOS";
            sosBtn.style.backgroundColor = isSOS ? "#991b1b" : "#ef4444";
        });

        startBtn.addEventListener('click', () => {
            if (navigator.geolocation) {
                statusTxt.innerHTML = "Connecting...";
                
                // Set offline status if user closes app
                onDisconnect(userRef).update({ isOnline: false, status: "Offline" });

                watchId = navigator.geolocation.watchPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lng = position.coords.longitude;
                        const acc = position.coords.accuracy;
                        let speed = position.coords.speed; // Speed in m/s
                        speed = speed ? Math.round(speed * 3.6) : 0; // Convert to km/h
                        
                        speedTxt.innerText = `${speed} km/h`;

                        set(userRef, {
                            latitude: lat,
                            longitude: lng,
                            accuracy: acc,
                            speed: speed,
                            battery: batteryLevel,
                            charging: isCharging,
                            sos: isSOS,
                            isOnline: true,
                            timestamp: new Date().toLocaleString()
                        });

                        statusTxt.innerHTML = `🟢 Transmitting Live`;
                        startBtn.style.display = "none";
                        stopBtn.style.display = "block";
                        sosBtn.style.display = "block";
                    },
                    (error) => { statusTxt.innerHTML = "⚠️ Allow Location Permission!"; },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            }
        });

        stopBtn.addEventListener('click', () => {
            if (watchId) navigator.geolocation.clearWatch(watchId);
            set(userRef, { isOnline: false, timestamp: new Date().toLocaleString() }); // Mark offline
            statusTxt.innerHTML = "Status: Disconnected";
            startBtn.style.display = "block";
            stopBtn.style.display = "none";
            sosBtn.style.display = "none";
            isSOS = false;
        });
    </script>
</body>
</html>
