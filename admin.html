<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Command Center</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: #000;}
        #map { height: 100vh; width: 100%; z-index: 1; }
        
        .dashboard { position: absolute; top: 15px; left: 15px; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); padding: 20px; border-radius: 15px; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.8); width: 320px; border: 1px solid rgba(56,189,248,0.2); color: white;}
        .dash-header { font-size: 20px; font-weight: bold; border-bottom: 1px solid #334155; padding-bottom: 10px; margin-bottom: 15px; color: #38bdf8; display: flex; justify-content: space-between; align-items: center;}
        
        .data-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 8px;}
        .data-label { color: #94a3b8; } .data-val { font-weight: bold; color: #f8fafc;}
        
        /* Address Box */
        .address-box { background: rgba(16, 185, 129, 0.1); border-left: 4px solid #10b981; padding: 10px; border-radius: 5px; font-size: 13px; color: #e2e8f0; margin-bottom: 15px; line-height: 1.4;}
        
        /* Controls */
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .action-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white;}
        .ring-btn { background: #ef4444; } .msg-btn { background: #3b82f6; }
        
        /* Marker rotation magic */
        .smart-marker { text-align: center; font-size: 35px; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.5)); transition: transform 0.3s; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="dash-header">🛰️ Tracker Pro <span id="statusBadge" style="background:#10b981; padding: 3px 8px; border-radius: 10px; font-size: 12px; color:white;">Live</span></div>
        
        <div class="address-box" id="addressUI">📍 Fetching live street address...</div>

        <div class="data-row"><span class="data-label">Device Info:</span> <span class="data-val" id="deviceUI">--</span></div>
        <div class="data-row"><span class="data-label">Battery Power:</span> <span class="data-val" id="batUI">--</span></div>
        <div class="data-row"><span class="data-label">Current Speed:</span> <span class="data-val" id="speedUI">0 km/h</span></div>
        <div class="data-row"><span class="data-label">GPS Accuracy:</span> <span class="data-val" id="accUI">-- meters</span></div>
        
        <div class="btn-group">
            <button id="ringBtn" class="action-btn ring-btn">🔔 Ring Phone</button>
            <button id="msgBtn" class="action-btn msg-btn">💬 Send Msg</button>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyAoQw5dhwS5JJZIWSPQTgKdMtB5ZEsoxLk", authDomain: "arng-805db.firebaseapp.com", projectId: "arng-805db", databaseURL: "https://arng-805db-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig); const db = getDatabase(app);

        // Map Setup (Satellite default)
        const satelliteMap = L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains: ['mt0', 'mt1', 'mt2', 'mt3']});
        const map = L.map('map', { layers: [satelliteMap] }).setView([23.8103, 90.4125], 6);

        let marker = null;
        let accuracyRadar = null; // একুরেসি রাডার (নীল বৃত্ত)
        let routeLine = L.polyline([], {color: '#ef4444', weight: 4, opacity: 0.8}).addTo(map); // রুট লাইন (লাল দাগ)
        let lastGeocodeTime = 0;

        // Message & Ring Buttons
        document.getElementById('msgBtn').addEventListener('click', () => {
            const msg = prompt("Enter your message:");
            if(msg) set(ref(db, 'live_location/chat'), { message: msg, time: Date.now() });
        });
        document.getElementById('ringBtn').addEventListener('click', () => { set(ref(db, 'live_location/command'), { ringTime: Date.now() }); });

        // লাইভ রাস্তার নাম বের করার ফাংশন (Reverse Geocoding)
        function fetchAddress(lat, lng) {
            const now = Date.now();
            if(now - lastGeocodeTime < 15000) return; // ১৫ সেকেন্ডে ১ বার কল হবে (ব্যান হওয়া ঠেকাতে)
            lastGeocodeTime = now;
            fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}`)
                .then(res => res.json())
                .then(data => { document.getElementById('addressUI').innerText = `📍 ${data.display_name}`; })
                .catch(err => console.log(err));
        }

        const locationRef = ref(db, 'live_location/target_user');
        
        onValue(locationRef, (snapshot) => {
            const data = snapshot.val();
            if (data && data.isOnline) {
                const { latitude: lat, longitude: lng, accuracy, speed, heading, battery, deviceInfo } = data;
                
                // UI Update
                document.getElementById('deviceUI').innerText = deviceInfo;
                document.getElementById('batUI').innerText = `${battery}%`;
                document.getElementById('speedUI').innerText = `${speed} km/h`;
                document.getElementById('accUI').innerText = `${Math.round(accuracy)}m`;

                // লাইভ এড্রেস কল
                fetchAddress(lat, lng);

                // আইকন সিলেকশন এবং রোটেশন (কম্পাস)
                let emoji = speed > 10 ? "🚘" : (speed > 2 ? "🚶‍♂️" : "🧍‍♂️");
                // যদি স্পিড থাকে, তবে গাড়ি/মানুষ যেদিকে যাচ্ছে আইকন সেদিকে ঘুরবে
                let htmlFormat = `<div class="smart-marker" style="transform: rotate(${heading}deg);">${emoji}</div>`;
                const smartIcon = L.divIcon({ className: '', html: htmlFormat, iconSize: [40, 40], iconAnchor: [20, 20] });

                const latlng = [lat, lng];
                routeLine.addLatLng(latlng); // ম্যাপে রাস্তার দাগ আঁকা হচ্ছে

                if (!marker) { 
                    // ফার্স্ট টাইম ম্যাপ লোড
                    accuracyRadar = L.circle(latlng, { radius: accuracy, color: '#38bdf8', fillColor: '#38bdf8', fillOpacity: 0.2 }).addTo(map);
                    marker = L.marker(latlng, {icon: smartIcon}).addTo(map); 
                    map.flyTo(latlng, 18); 
                } else { 
                    // লাইভ আপডেট
                    marker.setLatLng(latlng); 
                    marker.setIcon(smartIcon); 
                    accuracyRadar.setLatLng(latlng);
                    accuracyRadar.setRadius(accuracy); // রাডার সাইজ আপডেট
                    if(speed > 2) map.panTo(latlng); // চললে ম্যাপ নিজে নিজে সরবে
                }
            } else {
                document.getElementById('statusBadge').style.background = '#64748b';
                document.getElementById('statusBadge').innerText = 'Offline';
            }
        });
    </script>
</body>
</html>
